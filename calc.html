<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Calculadora de Servidor</title>
</head>

<body>

<h2>Consumo de Servidor</h2>

<h3>Potência do servidor (W) <input id="ipt_pot"></h3>
<h3>Preço do kWh (R$) <input id="ipt_preco"></h3>

<h2>Ambiente</h2>

<h3>Temperatura atual (°C) <input id="ipt_temp"></h3>
<h3>Umidade atual (%) <input id="ipt_umidade"></h3>

<button onclick="calcular()">Calcular</button>

<div id="div_msg"></div>

<script>

function calcular(){

let pot = Number(ipt_pot.value)
let preco = Number(ipt_preco.value)

let temp = Number(ipt_temp.value)
let umidade = Number(ipt_umidade.value)

// padrão fixo
let horas = 24
let dias = 30

// consumo base
let consumo = (pot * horas * dias) / 1000
let custo = consumo * preco

// custo com ambiente ruim
let custoAtual = custo

// impacto da temperatura
if (temp > 24) {
    custoAtual = custoAtual * 1.2
}

// impacto da umidade
if (umidade > 60) {
    custoAtual = custoAtual + 50
}

// custo ideal
let custoIdeal = custo

// economia
let economia = custoAtual - custoIdeal

// alertas
let alerta = ""

if (temp > 24) {
    alerta = alerta + " Temperatura alta<br>"
}

if (umidade > 60) {
    alerta = alerta + " Umidade alta<br>"
}

if (alerta == "") {
    alerta = " Ambiente ideal"
}

// exibição
div_msg.innerHTML = `
<h3>Consumo mensal: ${consumo.toFixed(2)} kWh</h3>

<b>Custo normal: R$ ${custo.toFixed(2)}</b><br>
<b>Custo com ambiente atual: R$ ${custoAtual.toFixed(2)}</b><br>
<b>Custo ideal: R$ ${custoIdeal.toFixed(2)}</b><br><br>

<h3>Economia possível: R$ ${economia.toFixed(2)}</h3>

<h3>Status do ambiente:</h3>
${alerta}
`

}

</script>

</body>
</html>
